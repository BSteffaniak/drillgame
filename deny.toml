# cargo-deny configuration for drillgame.
# Run `cargo deny check` locally or in CI.

[advisories]
version = 2
yanked  = "deny"

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
]
confidence-threshold = 0.8
version = 2

[bans]
multiple-versions = "allow"
wildcards         = "allow"

[sources]
allow-git        = []
unknown-git      = "allow"
unknown-registry = "deny"
