[package]
authors.workspace    = true
categories           = ["games"]
description          = "Desktop raylib frontend for Drillgame"
edition.workspace    = true
keywords             = ["game", "mining", "raylib"]
license.workspace    = true
name                 = "drillgame_game"
readme               = "README.md"
repository.workspace = true
version.workspace    = true

[features]
default          = []
fail-on-warnings = []

[[bin]]
name = "drillgame"
path = "src/main.rs"

[dependencies]
raylib     = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
